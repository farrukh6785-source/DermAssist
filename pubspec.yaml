name: dermassist_fyp
description: DermAssist - AI-powered Dermatology Screening Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase - Core Services
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  google_sign_in: ^6.2.1
  cloud_functions: ^4.7.6

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.1

  # Image Handling
  image_picker: ^1.0.7
  image: ^4.1.3
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0

  # Maps & Location
  google_maps_flutter: ^2.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.2.5
  app_settings: ^5.1.1

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.11.3
  path_provider: ^2.1.2
  share_plus: ^10.0.0

  # UI & UX
  flutter_animate: ^4.5.0
  lottie: ^3.3.2
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.2

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Date & Time
  intl: ^0.20.2

  # Permissions
  permission_handler: ^11.3.0

  # Connectivity
  connectivity_plus: ^6.0.2

  # Utilities
  uuid: ^4.3.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0

  # Image Editing
  image_cropper: ^7.0.0

  # Icons & Fonts
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Gloock
      fonts:
        - asset: assets/fonts/Gloock-Regular.ttf

    - family: Petrona
      fonts:
        - asset: assets/fonts/Petrona-VariableFont_wght.ttf